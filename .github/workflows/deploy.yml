name: NexDesk CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Smoke test
        run: |
          python -c "
          import os, sys
          os.environ['DATABASE'] = '/tmp/test.db'
          from database import init_db
          init_db()
          from app import app
          client = app.test_client()
          r = client.get('/')
          assert r.status_code == 200
          print('Tests passed')
          "

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexdesk:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexdesk:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nexdesk:latest
            docker stop nexdesk || true
            docker rm nexdesk || true
            docker run -d \
              --name nexdesk \
              --restart always \
              -p 5000:5000 \
              -v nexdesk_data:/app/data \
              -e FLASK_ENV=production \
              -e DATABASE=/app/data/tickets.db \
              ${{ secrets.DOCKERHUB_USERNAME }}/nexdesk:latest
            docker image prune -f
            echo "Deployed successfully"